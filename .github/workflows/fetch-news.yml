name: News Fetch (every 4h)

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4h UTC: 00:00 / 04:00 / 08:00 / 12:00 / 16:00 / 20:00
  workflow_dispatch:        # Allow manual trigger for testing

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch-and-store:
    name: fetch-and-store
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
      SITE_URL: ${{ secrets.SITE_URL }}
      SCRAPER_SERVICE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python + Scrapling ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper-service/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper-service/requirements.txt

      - name: Cache Camoufox browser
        uses: actions/cache@v4
        with:
          path: ~/.local/share/camoufox
          key: camoufox-${{ hashFiles('scraper-service/requirements.txt') }}

      - name: Install Camoufox (if not cached)
        run: python -c "import camoufox; camoufox.get_path()" 2>/dev/null || scrapling install

      - name: Start scraper service
        run: |
          cd scraper-service
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:8000/health && echo "✓ Scraper ready" && break
            sleep 2
          done

      # ── Node.js + fetch ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run news fetch script
        run: npx tsx scripts/fetch.ts

      - name: Revalidate Vercel cache
        if: success()
        run: |
          curl -sfL "${{ secrets.SITE_URL }}/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}" \
            && echo "✓ Cache revalidated" \
            || echo "⚠ Revalidation failed (non-fatal)"

      - name: Log failure
        if: failure()
        run: echo "Fetch failed — check logs"
