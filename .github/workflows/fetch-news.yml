name: News Fetch (every 4h)

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4h UTC: 00:00 / 04:00 / 08:00 / 12:00 / 16:00 / 20:00
  workflow_dispatch:        # Allow manual trigger for testing

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch-and-store:
    name: fetch-and-store
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
      SITE_URL: ${{ secrets.SITE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run news fetch script
        run: npx tsx scripts/fetch.ts

      - name: Revalidate Vercel cache
        if: success()
        run: |
          curl -sfL "${{ secrets.SITE_URL }}/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}" \
            && echo "✓ Cache revalidated" \
            || echo "⚠ Revalidation failed (non-fatal)"

      - name: Log failure
        if: failure()
        run: echo "Fetch failed — check logs"
